<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Drop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- HUD -->
        <header id="hud">
            <div class="stat-box water-box">
                <span class="icon">💧</span>
                <div class="bar-container tooltip" data-tooltip="Água: essencial para sobreviver. Drena em tempo real.">
                    <div id="water-bar" class="bar water-fill"></div>
                </div>
                <span id="water-text" class="stat-text">100/100</span>
            </div>
            
            <div class="stat-box food-box">
                <span class="icon">🍎</span>
                <div class="bar-container tooltip" data-tooltip="Comida: energia. Fome causa morte populacional.">
                    <div id="food-bar" class="bar food-fill"></div>
                </div>
                <span id="food-text" class="stat-text">100/100</span>
            </div>
            
            <div id="energy-section" class="stat-box energy-box hidden">
                <span class="icon">⚡</span>
                <div class="bar-container tooltip" data-tooltip="Energia: move as máquinas avançadas. Vem dos painéis solares.">
                    <div id="energy-bar" class="bar energy-fill" style="width: 0%; background: #f1c40f;"></div>
                </div>
                <span id="energy-text" class="stat-text">0/100</span>
            </div>
            
            <div class="stat-box pop-box tooltip" data-tooltip="População: Consomem recursos constantemente.">
                <span class="icon">👥</span>
                <span id="pop-text" class="stat-text">10</span>
            </div>

            <div class="stat-box days-box tooltip" data-tooltip="1 Dia = 20 segundos">
                <span>DIA <span id="days-text">1</span></span>
                <div class="day-progress-bar">
                    <div id="day-bar-fill"></div>
                </div>
            </div>
        </header>

        <main id="main-area">
            <!-- Graphics -->
            <div id="canvas-container">
                <canvas id="gameCanvas" width="600" height="540"></canvas>
                <div id="weather-overlay"></div>
                <div id="pause-overlay" class="hidden"><h2>JOGO PAUSADO</h2></div>
            </div>

            <!-- Controls and Logs -->
            <aside id="dashboard">
                <div class="actions-panel">
                    <h2>Ações</h2>
                    <div class="actions-scroll">
                        <button id="btn-pause" class="action-btn" title="Pausa ou retoma a passagem do tempo.">Pausar Jogo (Esc) ⏸️</button>
                        <button id="btn-ration" class="action-btn warning" title="Reduz consumo de água por 20 seg, mas pode causar mortes (Racionamento).">Racionar Água</button>
                        <button id="btn-dig" class="action-btn info" title="Custa 15 🍎. Demora 5s. Chance de achar um poço d'água.">Cavar Poço (15 🍎)</button>
                        <button id="btn-hunt" class="action-btn hunter" title="Custa 3 🍎 e 5 💧. Chance de presa (20-35 🍎).">Caçar Expedição 🎯</button>
                        <button id="btn-school" class="action-btn purple" title="Custa 20 💧. Demora 10s. Constrói uma Escola (reduz tempo de caça, aumenta limite de base).">Construir Escola (0) 🏫</button>
                        
                        <div id="unlock-msg" class="unlock-message">Compre 10 Escolas para desbloquear esta seção</div>
                        <div id="advanced-actions-container" class="hidden">
                            <button id="btn-solar" class="action-btn solar" title="Custa 50 🍎 e 200 💧. Gera 2 ⚡/s. Max Energia +50.">Painel Solar (0) ☀️</button>
                            <div id="unlock-drill-msg" class="unlock-message">Compre um Painel Solar para desbloquear esta seção</div>
                            <button id="btn-drill" class="action-btn drill hidden" title="Custa 50 🍎 e 50 💧. Gasta 1 ⚡/s e gera 1 💧 a cada 3s.">Broca D'Água (0) 🪛</button>
                        </div>
                    </div>
                </div>
                
                <div class="log-panel">
                    <h2>Registro de Eventos</h2>
                    <ul id="event-log">
                    </ul>
                </div>
            </aside>
        </main>
        
        <!-- Modal Game Over -->
        <div id="game-over-modal" class="hidden">
            <div class="modal-content">
                <h1 id="game-over-title">Fim de Jogo</h1>
                <p id="game-over-desc">A seca venceu.</p>
                <p>Dias Sobrevividos: <span id="final-days"></span></p>
                <button id="btn-restart" class="action-btn primary" style="margin-top: 20px;">Tentar Novamente</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
